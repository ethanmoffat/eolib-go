version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    generated: strict
    paths:
      - '(.+)_generated\.go'
      - '(.+)packetmap_generated\.go'
    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    staticcheck:
      checks:
        - all
        - -QF1012
        - -ST1000
        - -ST1003
        - -ST1020
